<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園生存五日挑戰</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .status-bar {
            display: flex;
            justify-content: space-around;
            background-color: #3a3a3a;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        .hp { color: #ff4d4d; font-weight: bold; }
        .stress { color: #ffaa00; font-weight: bold; }
        .info { color: #4da6ff; }
        .title {
            font-size: 1.5em;
            color: #ff3333;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .content {
            font-size: 1.2em;
            margin-bottom: 30px;
            min-height: 80px;
            line-height: 1.6;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            background-color: #444;
            color: white;
            border: 2px solid #666;
            padding: 12px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            padding-left: 20px;
        }
        button:hover {
            background-color: #555;
            border-color: #999;
        }
        .start-btn, .next-btn {
            text-align: center;
            background-color: #28a745;
            border-color: #1e7e34;
            padding: 12px 30px;
            font-size: 1.2em;
            display: inline-block;
            margin: 0 auto;
        }
        .start-btn:hover, .next-btn:hover {
            background-color: #218838;
        }
        .log-msg {
            color: #00ffcc;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="status-bar">
        <div>第 <span id="loop-display" class="info">1</span> 次輪迴</div>
        <div>第 <span id="day-display" class="info">0</span> 天</div>
        <div>生命值: <span id="hp-display" class="hp">3 / 3</span></div>
        <div>壓力值: <span id="stress-display" class="stress">30</span> / <span id="max-stress-display">100</span></div>
    </div>

    <div id="game-body">
        </div>
</div>

<script>
    // 原始題目資料
    const allQuestions = [
        {
            title: "地科課：老師教大家念課文，你選擇？",
            options: [
                { text: "跟著唸", stress: -10, hp: 0, msg: "活過一天" },
                { text: "不念", stress: 30, hp: -1, msg: "被老師發現老師讓你起立罰站" },
                { text: "嘴巴動但不發出聲音", stress: 10, hp: 0, msg: "活過一天" }
            ]
        },
        {
            title: "數學課：數學老師要抽人上台寫題目然後抽到你，可是你不會，你選擇？",
            options: [
                { text: "直接站起來", stress: 20, hp: -1, msg: "機車勒" },
                { text: "隨便編", stress: 30, hp: -1, msg: "I don't think so" },
                { text: "說「機車勒」", stress: -20, hp: -2, msg: "以後每次上課你都會被點來回答問題" }
            ]
        },
        {
            title: "數學段考後：考完數學段考，題目你都不會寫，你選擇？",
            options: [
                { text: "到走廊說出題老師是不是有病", stress: 30, hp: -2, msg: "出題老師剛好走過去然後對你說「有什麼意見」" },
                { text: "說「機車勒」", stress: -20, hp: 0, msg: "順利度過" },
                { text: "叫家長會出來抗議", stress: 40, hp: -1, msg: "笑死" }
            ]
        },
        {
            title: "美術課：你選擇做什麼？",
            options: [
                { text: "玩手機", stress: -20, hp: 0, msg: "這個直接當掉" },
                { text: "玩手機還亂叫", stress: -30, hp: 0, msg: "這個直接死當" },
                { text: "乖乖畫畫", stress: 20, hp: 0, msg: "順利度過" }
            ]
        },
        {
            title: "化學課：化學課抽到你上台寫題目，你選擇？",
            options: [
                { text: "用小數計算", stress: 10, hp: 0, msg: "順利度過" },
                { text: "用分數計算", stress: 30, hp: -1, msg: "你們是跟小數有仇是不是" },
                { text: "一個不小心計算錯", stress: 50, hp: -2, msg: "你們都以為自己計算能力很好喔" }
            ]
        }
    ];

    // 遊戲狀態變數
    let currentLoop = 1;
    let currentDay = 0;
    let hp = 3;
    let maxHp = 3;
    let stress = 30;
    let maxStress = 100;
    let shuffledQuestions = [];

    const gameBody = document.getElementById('game-body');

    // 瀏覽器內建音效產生器 (不需要外部音效檔)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'click') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'hurt') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'gameover') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.setValueAtTime(70, audioCtx.currentTime + 0.2);
            osc.frequency.setValueAtTime(50, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        } else if (type === 'win') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.setValueAtTime(400, audioCtx.currentTime + 0.15);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    // 陣列亂數打亂函式
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        const newArray = JSON.parse(JSON.stringify(array)); // 深拷貝
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [newArray[currentIndex], newArray[randomIndex]] = [newArray[randomIndex], newArray[currentIndex]];
        }
        return newArray;
    }

    // 更新介面數值
    function updateUI() {
        document.getElementById('loop-display').innerText = currentLoop;
        document.getElementById('day-display').innerText = currentDay;
        document.getElementById('hp-display').innerText = `${hp} / ${maxHp}`;
        document.getElementById('stress-display').innerText = stress;
        document.getElementById('max-stress-display').innerText = maxStress;
    }

    // 遊戲初始畫面
    function initScreen() {
        currentLoop = 1;
        maxStress = 100;
        resetStatus();
        
        gameBody.innerHTML = `
            <div class="title">無止盡的輪迴，毀壞的校園</div>
            <div class="content">
                起始狀態： 生命值：3 / 3 | 壓力值：30 / 100<br>
                壓力值達到 100 會造成「精神崩潰」直接死亡。<br>
                在學校努力生存 5 天吧。
            </div>
            <button class="start-btn" onclick="startGame()">確定</button>
        `;
        updateUI();
    }

    // 重置生命與壓力（新輪迴用）
    function resetStatus() {
        hp = 3;
        stress = 30;
        currentDay = 0;
        shuffledQuestions = shuffle(allQuestions);
    }

    // 開始遊戲/新輪迴
    function startGame() {
        playSound('click');
        nextDay();
    }

    // 進入下一天（處理每日換日事件）
    function nextDay() {
        currentDay++;
        
        // 檢查是否完成 5 天
        if (currentDay > 5) {
            handleLoopClear();
            return;
        }

        // 輪迴 3 以上：換日時自動增長壓力 +10
        let autoStressMsg = "";
        if (currentLoop >= 3) {
            stress += 10;
            autoStressMsg = "<br><span style='color:#ffaa00;'>【慢性窒息感】換日自動 +10 壓力！</span>";
            if (stress >= maxStress) {
                gameOver("精神崩潰！壓力過大觸發創傷身亡。");
                return;
            }
        }

        // 輪迴 5：隨機突擊檢查 (30% 機率)
        let eventMsg = "";
        if (currentLoop === 5 && Math.random() < 0.3) {
            playSound('hurt');
            const rand = Math.random();
            if (rand < 0.5) {
                hp -= 1;
                eventMsg = "<div style='color:#ff4d4d; margin-bottom:10px;'><b>【突擊檢查】</b>上課偷玩手機被抓到！扣除 1 條生命！</div>";
            } else {
                stress += 20;
                eventMsg = "<div style='color:#ffaa00; margin-bottom:10px;'><b>【突擊檢查】</b>上課偷玩手機被抓到！壓力增加 20！</div>";
            }
            updateUI();
            if (hp <= 0) { gameOver("生命值歸零，你被退學了。"); return; }
            if (stress >= maxStress) { gameOver("精神崩潰！壓力爆表。"); return; }
        }

        updateUI();
        showQuestion(eventMsg + autoStressMsg);
    }

    // 顯示當天題目
    function showQuestion(eventText = "") {
        const qData = shuffledQuestions[currentDay - 1];
        const shuffledOptions = shuffle(qData.options); // 打亂選項

        let html = `${eventText}<div class="title">第 ${currentDay} 天</div>`;
        html += `<div class="content"><b>${qData.title}</b></div>`;
        html += `<div class="btn-container">`;
        
        shuffledOptions.forEach((opt) => {
            html += `<button onclick="selectOption(${JSON.stringify(opt).replace(/"/g, '&quot;')})">${opt.text}</button>`;
        });
        
        html += `</div>`;
        gameBody.innerHTML = html;
    }

    // 玩家選擇選項
    function selectOption(opt) {
        // 核心難度機制：輪迴 4 以上且殘血(生命=1)，壓力傷害翻倍
        let appliedStress = opt.stress;
        if (currentLoop >= 4 && hp === 1 && opt.stress > 0) {
            appliedStress = opt.stress * 2;
        }

        stress += appliedStress;
        if (stress < 0) stress = 0; // 壓力不為負數

        hp += opt.hp;

        // 播音效 (扣血播受傷音效，普通播點擊)
        if (opt.hp < 0) {
            playSound('hurt');
        } else {
            playSound('click');
        }

        updateUI();

        // 檢查死亡條件
        if (stress >= maxStress) {
            gameBody.innerHTML = `
                <div class="title" style="color:#ff3333;">【精神崩潰】</div>
                <div class="content">${opt.msg ? opt.msg + '<br>' : ''}壓力值達到 ${stress}/${maxStress}，你瘋了...</div>
                <button class="start-btn" onclick="initScreen()">重新開始</button>
            `;
            playSound('gameover');
            return;
        }

        if (hp <= 0) {
            gameBody.innerHTML = `
                <div class="title" style="color:#ff3333;">【走向終局】</div>
                <div class="content">${opt.msg ? opt.msg + '<br>' : ''}生命值歸零，你在校園中倒下了...</div>
                <button class="start-btn" onclick="initScreen()">重新開始</button>
            `;
            playSound('gameover');
            return;
        }

        // 顯示選擇結果
        gameBody.innerHTML = `
            <div class="title">事件結果</div>
            <div class="content">
                <p>顯示：${opt.msg}</p>
                <p style="font-size:0.9em; color:#aaa;">
                    變動：壓力 ${appliedStress >= 0 ? '+' + appliedStress : appliedStress} | 
                    生命 ${opt.hp !== 0 ? opt.hp : '無變動'}
                </p>
            </div>
            <button class="next-btn" onclick="nextDay()">繼續</button>
        `;
    }

    // 處理輪迴通過
    function handleLoopClear() {
        playSound('win');
        currentLoop++;
        
        if (currentLoop === 2) {
            maxStress = 80;
            resetStatus();
            gameBody.innerHTML = `
                <div class="title" style="color:#00ffcc;">成功活過第一輪！進入第二輪迴</div>
                <div class="content" style="text-align:left;">
                    <b>【新規則：精神崩潰邊緣縮減】</b><br>
                    學校的惡意加深了... 精神崩潰的壓力上限從 100 降到 <b>80</b>，容錯率大幅降低！<br><br>
                    狀態已刷新（生命:3/3，壓力:30）
                </div>
                <button class="start-btn" onclick="startGame()">進入第二輪</button>
            `;
        } else if (currentLoop === 3) {
            maxStress = 80;
            resetStatus();
            gameBody.innerHTML = `
                <div class="title" style="color:#00ffcc;">成功活過第二輪！進入第三輪迴</div>
                <div class="content" style="text-align:left;">
                    <b>【新規則：壓力自動增長】</b><br>
                    高壓的窒息感襲來。除了上一輪的規則外，現在<b>每天換日時，壓力值會自動 +10</b>！<br><br>
                    狀態已刷新（生命:3/3，壓力:30）
                </div>
                <button class="start-btn" onclick="startGame()">進入第三輪</button>
            `;
        } else if (currentLoop === 4) {
            maxStress = 80;
            resetStatus();
            gameBody.innerHTML = `
                <div class="title" style="color:#00ffcc;">成功活過第三輪！進入第四輪迴</div>
                <div class="content" style="text-align:left;">
                    <b>【新規則：創傷後群連鎖效應】</b><br>
                    驚恐深植內心。當你<b>生命值只剩 1 條（殘血）</b>時，玩家陷入慌張，此時<b>所有選項造成的壓力傷害直接「翻倍」</b>！<br><br>
                    狀態已刷新（生命:3/3，壓力:30）
                </div>
                <button class="start-btn" onclick="startGame()">進入第四輪</button>
            `;
        } else if (currentLoop === 5) {
            maxStress = 80;
            resetStatus();
            gameBody.innerHTML = `
                <div class="title" style="color:#00ffcc;">成功活過第四輪！進入第五輪迴</div>
                <div class="content" style="text-align:left;">
                    <b>【新規則：突擊檢查事件】</b><br>
                    教官與老師開始瘋狂巡邏。現在<b>每天換日都有 30% 機率觸發「上課偷玩手機被抓到」</b>，會隨機扣血或加壓力！撐過這群瘋子就贏了！<br><br>
                    狀態已刷新（生命:3/3，壓力:30）
                </div>
                <button class="start-btn" onclick="startGame()">進入第五輪</button>
            `;
        } else if (currentLoop > 5) {
            gameBody.innerHTML = `
                <div class="title" style="color:#ffcc00; font-size:2em;">恭喜逃離學校！</div>
                <div class="content">
                    你成功打破了無止盡的輪迴，戰勝了地科、數學、美術、化學老師，以及恐怖的突擊檢查。<br>
                    <b>你自由了！遊戲結束。</b>
                </div>
                <button class="start-btn" onclick="initScreen()">再次挑戰</button>
            `;
        }
        updateUI();
    }

    // 獨立的突擊檢查/自動扣血死亡處理
    function gameOver(reason) {
        playSound('gameover');
        gameBody.innerHTML = `
            <div class="title" style="color:#ff3333;">【遊戲結束】</div>
            <div class="content">${reason}</div>
            <button class="start-btn" onclick="initScreen()">重新開始</button>
        `;
    }

    // 啟動遊戲
    initScreen();
</script>

</body>
</html>
